name: ci

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore CleanArcInterview.sln

      - name: Build
        run: dotnet build CleanArcInterview.sln -c Release --no-restore

      - name: Smoke Test
        run: dotnet run --project CleanArc.Tests/CleanArc.Tests.csproj -c Release --no-build

      - name: Integration Tests (Testcontainers)
        run: dotnet test CleanArc.IntegrationTests/CleanArc.IntegrationTests.csproj -c Release --no-build --logger "trx;LogFileName=integration-tests.trx"
